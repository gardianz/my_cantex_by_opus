# Cantex Autoswap Bot — Example Configuration
# Copy this file to accounts.toml and fill in your keys

[settings]
base_url = "https://api.cantex.io"
execution_mode = "sequential"
max_concurrency = 1
swap_delay_seconds = { min = 1.0, max = 1.0 }

# Fee control
max_network_fee_cc_per_execution = "0.36"    # Max fee per swap (CC)
max_slippage_per_execution = "0.001"         # Max slippage per hop (0.001 = 0.1%)
fee_stability_enabled = true                  # Cek rata-rata N quote sebelum swap
fee_stability_samples = 3                     # Jumlah quote untuk rata-rata
fee_fast_poll_range = { min = "0.30", max = "0.40" }  # Fee dalam range ini → poll 1 detik

# Fee polling interval (detik) — digunakan saat fee di luar fast_poll_range
network_fee_poll_seconds = { min = 5.0, max = 10.0 }

# 24h mode
full_24h_mode = true
full_24h_startup_mode = "direct"    # "direct" atau "planned"
full_24h_min_gap_minutes = 5
full_24h_auto_restart = true
weekly_stop_on_monday_utc = true
full_24h_schedule_log_limit = 12
random_seed = ""

# Telegram
telegram_enabled = true
telegram_bot_token = "env:TELEGRAM_BOT_TOKEN"
telegram_chat_id = "env:TELEGRAM_CHAT_ID"

# Dashboard
terminal_dashboard_enabled = true
terminal_dashboard_logs_limit = 20
terminal_dashboard_min_interval_seconds = 0.25
telegram_update_min_interval_seconds = 5
telegram_latest_logs_limit = 6

# Activity & misc
activity_enabled = true
activity_items_limit = 5
dry_run = false
log_level = "INFO"
default_continue_on_low_balance = true
max_retries = 3
retry_base_delay = 5.0
swap_confirmation_timeout_seconds = 90    # Minimum timeout konfirmasi swap (detik). Default 90.
price_validation_tolerance_pct = "0.01"  # Toleransi harga sebelum swap (0.01 = 1%). Bisa di-set via /set price_tolerance

# Mode Withdraw — konfigurasi untuk mode 6 (withdraw CC ke alamat tujuan)
# Aktifkan dengan memilih mode 6 saat startup, atau --mode withdraw
# withdraw_target_address = "Cantex::1220..."   # Alamat tujuan (wajib diisi)
# withdraw_saldo_sisa = "0"                     # Saldo CC yang disisakan di akun
# withdraw_fee_reserve = "0"                    # Reserve untuk fee transfer
# withdraw_delay_seconds = 10                   # Delay antar akun (detik)
# withdraw_symbols = ["CC"]                     # Simbol yang di-withdraw (default CC)

[defaults]
strategy = "4"                    # 1=CC→USDCx, 2=CC→CBTC, 3=Cycle, 4=Reserve
rounds = 26                       # Target swap per hari (bisa range: { min = 24, max = 28 })
amounts = { CC = 13, USDCx = { min = "1.5", max = "1.7" }, CBTC = { min = "0.000023", max = "0.000025" } }
reserve_fee = "1"                 # Minimum CC yang harus tersisa
reserve_kritis = "1"              # Threshold darurat untuk recovery (wajib untuk strategy 4)

[[accounts]]
name = "wallet-1"
enabled = true
operator_key = "env:CANTEX_OPERATOR_KEY_1"
trading_key = "env:CANTEX_TRADING_KEY_1"
proxy_label = "No proxy"
allow_continue_on_low_balance = true
auto_create_intent_account = true

[[accounts]]
name = "wallet-2"
enabled = true
operator_key = "env:CANTEX_OPERATOR_KEY_2"
trading_key = "env:CANTEX_TRADING_KEY_2"
proxy_label = "No proxy"
allow_continue_on_low_balance = true
auto_create_intent_account = true

# Contoh akun dengan override per-akun:
# [[accounts]]
# name = "wallet-3"
# enabled = false
# operator_key = "env:CANTEX_OPERATOR_KEY_3"
# trading_key = "env:CANTEX_TRADING_KEY_3"
# strategy = "3"                  # Override strategy
# rounds = { min = 6, max = 9 }  # Override rounds
# reserve_fee = "5"
# reserve_kritis = "1"
